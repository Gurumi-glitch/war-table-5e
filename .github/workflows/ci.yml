name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
  # Reflect CI status onto the PR's `needs-work` label. failure() is true if ANY
  # matrix job failed; success() only if all passed — so the label goes on when
  # the build is red and comes off when it's green. Both gate on pull_request,
  # so pushes to main skip them.
  label-on-failure:
    needs: test
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # 預設的 contents:read 不夠,貼 label 要這個
    steps:
      - run: gh pr edit "$PR" --add-label needs-work
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
  label-on-success:
    needs: test
    if: success() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # `|| true`: removing a label the PR never had returns 404 — harmless, and
      # we don't want this cleanup step to redden an otherwise-green PR.
      - run: gh pr edit "$PR" --remove-label needs-work || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}